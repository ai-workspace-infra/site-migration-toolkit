name: Multi Cloud IAC Pipeline (Account/VPC Matrix)

on:
  push:
  pull_request:
    paths:
    - 'terraform-hcl-standard/**'
    - '.github/workflows/iac-pipeline-multi-cloud-account-matrix.yaml'
  workflow_dispatch:
    inputs:
      toolkit_ref:
        description: "platform-ops-toolkit 仓库的 Git Ref (例如 main, v1.0.0)。用于跨 Tag 触发时拉取指定代码"
        required: false
        type: string
      deploy_action:
        type: choice
        options: [plan, apply, destroy]
        default: plan
      project:
        description: "环境(项目) / Project (Base Domain)"
        type: string
        default: svc.plus
      vault_env_path:
        description: "Vault environment (e.g. sit, uat, prod)"
        type: choice
        options: [sit, uat, prod]
        default: sit
      cloud_provider:
        description: "服务商 / Cloud Provider"
        type: choice
        options: [aws-cloud, gcp-cloud, vultr-vps]
        default: aws-cloud
      components_json:
        description: '账号层级组件选择 (JSON数组格式，如 ["vpc","role"])'
        type: string
        default: '["vpc","role"]'
      gitops_repo_name:
        description: "GitOps repository (URL or owner/repo)"
        type: string
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        description: "GitOps repo ref (branch/tag/sha) to use"
        type: string
        default: main
  workflow_call:
    inputs:
      deploy_action:
        type: string
        required: false
        default: plan
      project:
        type: string
        required: false
        default: svc.plus
      vault_env_path:
        type: string
        required: false
        default: sit
      cloud_provider:
        type: string
        required: false
        default: aws-cloud
      components_json:
        type: string
        required: false
        default: '["vpc","role"]'
      gitops_repo_name:
        type: string
        required: false
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        type: string
        required: false
        default: main

permissions:
  id-token: write
  contents: read

env:
  PROJECT: ${{ inputs.project || github.event.inputs.project || 'svc.plus' }}
  CLOUD_PROVIDER: ${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}
  DEPLOY_ENV: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}
  DEPLOY_ACTION: ${{ inputs.deploy_action || github.event.inputs.deploy_action || 'plan' }}
  BASE_DIR: iac_modules/terraform-hcl-standard/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}/component/
  CONFIG_DIR: gitops/${{ inputs.project || github.event.inputs.project || 'svc.plus' }}/${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}
  GITOPS_REPO_ROOT: gitops

jobs:
  terraform:
    name: "${{ matrix.component }} :: pipeline (action=${{ inputs.deploy_action || github.event.inputs.deploy_action || 'plan' }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(inputs.components_json || github.event.inputs.components_json || '["vpc","role"]') }}

    steps:
    - name: Checkout Toolkit
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout iac_modules
      uses: actions/checkout@v4
      with:
        repository: ai-workspace-infra/iac_modules
        path: iac_modules

    - name: Load Vault secrets
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: https://vault.svc.plus
        method: jwt
        role: github-actions-platform-ops-toolkit-${{ env.DEPLOY_ENV }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        exportToken: true
        secrets: |
          kv/data/CICD TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
          kv/data/CICD TF_STATE_BUCKET | TF_STATE_BUCKET ;
          kv/data/CICD TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
          kv/data/CICD TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
          kv/data/CICD TF_STATE_REGION | TF_STATE_REGION

    - name: Setup IaC Environment
      uses: ./.github/actions/setup-iac-env
      with:
        gitops_repo_name: ${{ inputs.gitops_repo_name || github.event.inputs.gitops_repo_name || 'https://github.com/cloud-neutral-workshop/gitops.git' }}
        gitops_repo_ref: ${{ inputs.gitops_repo_ref || github.event.inputs.gitops_repo_ref || 'main' }}
        gitops_target_path: ${{ env.GITOPS_REPO_ROOT }}

    - name: Load AWS config
      if: ${{ env.CLOUD_PROVIDER == 'aws-cloud' }}
      run: |-
        .github/scripts/iac-pipeline-multi-cloud-account-matrix_terraform_load-aws-config.sh

    - uses: aws-actions/configure-aws-credentials@v4
      if: ${{ env.CLOUD_PROVIDER == 'aws-cloud' && env.AWS_ROLE_ARN != '' }}
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: ${{ env.AWS_ROLE_ARN }}

    - name: Setup Terraform CLI Args
      env:
        VAULT_TF_STATE_BUCKET: ${{ steps.vault.outputs.TF_STATE_BUCKET }}
        VAULT_TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
        VAULT_TF_STATE_SECRET_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        VAULT_TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
        MATRIX_COMPONENT: ${{ matrix.component }}
        VAULT_TF_STATE_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
      run: |-
        .github/scripts/iac-pipeline-multi-cloud-account-matrix_terraform_setup-terraform-cli-args.sh

    - name: Init
      working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
      run: .github/scripts/common_terraform_init.sh

    - name: Plan
      working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
      run: .github/scripts/common_terraform_plan.sh

    - name: Apply
      working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
      if: ${{ env.DEPLOY_ACTION == 'apply' }}
      run: .github/scripts/common_terraform_apply.sh

    - name: Destroy
      working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
      if: ${{ env.DEPLOY_ACTION == 'destroy' }}
      run: .github/scripts/common_terraform_destroy.sh

    - name: Skip Apply/Destroy
      if: ${{ env.DEPLOY_ACTION != 'apply' && env.DEPLOY_ACTION != 'destroy' }}
      run: .github/scripts/common_terraform_skip_apply_destroy.sh

    - name: Output
      working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
      if: ${{ env.DEPLOY_ACTION == 'apply' }}
      run: .github/scripts/common_terraform_output.sh
