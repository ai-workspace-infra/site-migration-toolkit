name: Multi Cloud IAC Pipeline (Account/VPC Matrix)

on:
  push:
  pull_request:
    paths:
      - 'terraform-hcl-standard/**'
      - '.github/workflows/iac-pipeline-multi-cloud-account-matrix.yaml'
  workflow_dispatch:
    inputs:
      deploy_action:
        type: choice
        options: [plan, apply, destroy]
        default: plan
      project:
        description: "环境(项目) / Project"
        type: string
        default: xzerolab
      vault_env_path:
        description: "Vault environment (e.g. sit, uat, prod)"
        type: choice
        options: [sit, uat, prod]
        default: sit
      cloud_provider:
        description: "服务商 / Cloud Provider"
        type: choice
        options: [aws-cloud, gcp-cloud, vultr-vps]
        default: aws-cloud
      components:
        description: "账号层级组件选择 (逗号分隔)"
        type: string
        default: 'vpc,role'
      gitops_repo_name:
        description: "GitOps repository (URL or owner/repo)"
        type: string
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        description: "GitOps repo ref (branch/tag/sha) to use"
        type: string
        default: main
  workflow_call:
    inputs:
      deploy_action:
        type: string
        required: false
        default: plan
      project:
        type: string
        required: false
        default: xzerolab
      vault_env_path:
        type: string
        required: false
        default: sit
      cloud_provider:
        type: string
        required: false
        default: aws-cloud
      components:
        type: string
        required: false
        default: 'vpc,role'
      gitops_repo_name:
        type: string
        required: false
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        type: string
        required: false
        default: main

permissions:
  id-token: write
  contents: read

env:
  PROJECT: ${{ inputs.project || github.event.inputs.project || 'xzerolab' }}
  CLOUD_PROVIDER: ${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}
  DEPLOY_ENV: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}
  DEPLOY_ACTION: ${{ inputs.deploy_action || github.event.inputs.deploy_action || 'plan' }}
  BASE_DIR: iac_modules/terraform-hcl-standard/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}/component/
  CONFIG_DIR: gitops/${{ inputs.project || github.event.inputs.project || 'xzerolab' }}/${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}
  GITOPS_REPO_ROOT: gitops

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.parse.outputs.components }}
    steps:
      - id: parse
        run: |
          COMPONENTS="${{ inputs.components || github.event.inputs.components || 'vpc,role' }}"
          if [ "$COMPONENTS" == "all" ]; then
            COMPONENTS="vpc,role"
          fi
          JSON_ARRAY=$(echo "$COMPONENTS" | tr -d ' ' | jq -R -c 'split(",")')
          echo "components=${JSON_ARRAY}" >> "$GITHUB_OUTPUT"

  terraform:
    needs: setup
    name: "${{ matrix.component }} :: pipeline (action=${{ inputs.deploy_action || github.event.inputs.deploy_action || 'plan' }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.setup.outputs.components) }}

    steps:
      - name: Checkout Toolkit
        uses: actions/checkout@v4

      - name: Checkout iac_modules
        uses: actions/checkout@v4
        with:
          repository: ai-workspace-infra/iac_modules
          path: iac_modules

      - name: Load Vault secrets
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.svc.plus
          method: jwt
          role: github-actions-platform-ops-toolkit-${{ env.DEPLOY_ENV }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          exportToken: true
          secrets: |
            kv/data/CICD TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
            kv/data/CICD TF_STATE_BUCKET | TF_STATE_BUCKET ;
            kv/data/CICD TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
            kv/data/CICD TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
            kv/data/CICD TF_STATE_REGION | TF_STATE_REGION

      - name: Setup IaC Environment
        uses: ./.github/actions/setup-iac-env
        with:
          gitops_repo_name: ${{ inputs.gitops_repo_name || github.event.inputs.gitops_repo_name || 'https://github.com/cloud-neutral-workshop/gitops.git' }}
          gitops_repo_ref: ${{ inputs.gitops_repo_ref || github.event.inputs.gitops_repo_ref || 'main' }}
          gitops_target_path: ${{ env.GITOPS_REPO_ROOT }}

      - name: Load AWS config
        if: ${{ env.CLOUD_PROVIDER == 'aws-cloud' }}
        run: |
          CONFIG_FILES="gitops/${{ env.PROJECT }}/${{ env.DEPLOY_ENV }}/${{ env.CLOUD_PROVIDER }}/account/bootstrap.yaml"
          export ACCOUNT_FILE="$CONFIG_FILES"
          python - <<'PY'
          import os
          import sys
          from pathlib import Path
          utils_dir = Path("iac_modules/terraform-hcl-standard/utils").resolve()
          sys.path.insert(0, str(utils_dir))
          from config_loader import load_account_credentials
          try:
              region, role_arn = load_account_credentials(os.environ["ACCOUNT_FILE"])
              with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
                  handle.write(f"AWS_REGION={region}\n")
                  handle.write(f"AWS_ROLE_ARN={role_arn}\n")
          except Exception as e:
              print(f"Warning: Failed to load dynamic AWS config: {e}")
              sys.exit(0)
          PY

      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.CLOUD_PROVIDER == 'aws-cloud' && env.AWS_ROLE_ARN != '' }}
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Setup Terraform CLI Args
        run: |
          echo "TF_CLI_ARGS_init=-backend-config=\"endpoint=${{ steps.vault.outputs.TF_STATE_ENDPOINT }}\" -backend-config=\"bucket=${{ steps.vault.outputs.TF_STATE_BUCKET }}\" -backend-config=\"key=${{ env.PROJECT }}/${{ env.DEPLOY_ENV }}/${{ env.CLOUD_PROVIDER }}/accounts/${{ matrix.component }}/terraform.tfstate\" -backend-config=\"access_key=${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}\" -backend-config=\"secret_key=${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}\" -backend-config=\"region=${{ steps.vault.outputs.TF_STATE_REGION }}\" -backend-config=\"skip_credentials_validation=true\" -backend-config=\"skip_metadata_api_check=true\" -backend-config=\"skip_region_validation=true\" -backend-config=\"use_path_style=true\"" >> "$GITHUB_ENV"

      - name: Init
        working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
        run: make init CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

      - name: Plan
        working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
        run: make plan CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

      - name: Apply
        working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
        if: ${{ env.DEPLOY_ACTION == 'apply' }}
        run: make apply CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

      - name: Destroy
        working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
        if: ${{ env.DEPLOY_ACTION == 'destroy' }}
        run: make destroy CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

      - name: Skip Apply/Destroy
        if: ${{ env.DEPLOY_ACTION != 'apply' && env.DEPLOY_ACTION != 'destroy' }}
        run: echo "Action set to plan → skipping apply/destroy steps."

      - name: Output
        working-directory: ${{ env.BASE_DIR }}/${{ matrix.component }}
        if: ${{ env.DEPLOY_ACTION == 'apply' }}
        run: terraform output -json
