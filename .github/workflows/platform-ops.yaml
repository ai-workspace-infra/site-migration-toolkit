name: Deploy Environment & Migrate Data (Data Sync)

# =============================================================================
# IaC ↔ 数据流单向迁移流水线 (Site Recovery)
# 1. 动态 Provision (基于 Terraform 创建新环境 platform-ops-toolkit)
# 2. 部署基础服务 (Bootstrap 部署，跑空环境)
# 3. 生产环境克隆与单向同步 (通过 site_migration Ansible 角色)
# =============================================================================

on:
  # Branches select a complete deployment profile. main provisions and deploys
  # an isolated UAT web-saas environment; stable refs select production.
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/deploy-action-runner-iac.yaml'
  push:
    branches:
    - main
    - 'release/**'
    tags:
    - 'v*'
    paths-ignore:
      - '.github/workflows/deploy-action-runner-iac.yaml'
  workflow_dispatch:
    inputs:
      runner_type:
        description: "选择 Runner 环境 (ubuntu-latest 或 self-hosted)"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
        - ubuntu-latest
        - self-hosted
      infra_ref:
        description: "iac_modules & playbooks 仓库共用的 Git Ref (分支名或 Tag 均可)"
        required: false
        default: "main"
        type: string
      toolkit_ref:
        description: "platform-ops-toolkit 仓库的 Git Ref (例如 main, v1.0.0)。用于跨 Tag 触发时拉取指定代码"
        required: false
        type: string
      console_ref:
        description: "xworkspace-console 仓库的 Git Ref (例如 main, v1.1.5, v1.1.4)"
        required: false
        default: "main"
        type: string
      offline_mode:
        description: "on-host 离线包模式: off=在线拉最新(默认); auto=离线加速; force=强制离线"
        required: false
        default: "off"
        type: choice
        options: ["off", "auto", "force"]
      source_host:
        description: "源环境 IP 或域名 (用于导出数据)"
        required: true
        default: "install.svc.plus"
        type: string
      source_domain_base:
        description: "源环境域名后缀 (例如 svc.plus)"
        required: true
        default: "svc.plus"
        type: string
      target_domain_base:
        description: "新环境域名后缀 (用于参数化替换，如 onwalk.net)"
        required: true
        default: "onwalk.net"
        type: string
      run_provision_and_deploy:
        description: "是否执行 Provision 和基础环境 Deploy? (如果只迁移数据则取消勾选)"
        required: false
        default: true
        type: boolean
      target_domains:
        description: "选择要执行的业务域 (Business Domain)"
        required: true
        default: "all"
        type: choice
        options:
        - all
        - ai-workspace
        - web-saas
        - infra-platform
        - agent-proxy
      cloud_provider:
        description: "云服务商 (目前仅 vultr-vps 已实现四个业务域的资源声明/凭据/Terraform 模块; 其余选项预留给未来多云支持, 选择后会在 provision 阶段直接失败, 不会被静默按 vultr 处理)"
        required: true
        type: choice
        options:
        - aws-cloud
        - gcp-cloud
        - azure-cloud
        - vultr-vps
      instance_plan:
        description: "选择 VPS 规格 (全域建议 4C8G，单域支持 2C4G 矩阵，agent-proxy 默认 1C2G)"
        required: true
        default: "4C8G"
        type: choice
        options:
        - 4C8G
        - 2C4G
        - 1C2G
      action:
        description: "执行动作 (deploy:仅部署服务 | destroy:销毁 | migrate/backup/restore:数据操作)"
        required: true
        default: "deploy"
        type: choice
        options: [deploy, destroy, migrate, backup, restore]
      confirm_dns_switch:
        description: "危险: 勾选此项将在最后一步接管原域名的生产流量 (仅真实灾备启用)"
        required: false
        default: false
        type: boolean
      vault_env_path:
        description: "Vault 环境路径 (如 sit, uat, prod)，用于动态 secrets 的读写"
        required: true
        default: "uat"
        type: choice
        options:
        - sit
        - uat
        - prod
      vault_addr:
        description: "Vault 服务地址 (可选，覆盖默认的 https://vault.svc.plus)"
        required: false
        type: string
      # 注意: 这里曾有一个 vault_token 输入作为 "JWT 异常时的兜底"。已移除。
      # workflow_dispatch 输入不脱敏且长期留在 run metadata 里, 任何有仓库读
      # 权限的人都能看到; 且 method:token 会绕过 role 上全部 bound_claims 绑定,
      # 等于给整套 OIDC 开一个常驻后门。JWT 认证有问题就修 role 绑定, 不要旁路。

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-env-migration
  cancel-in-progress: false

env:
  VAULT_ADDR: ${{ github.event.inputs.vault_addr || 'https://vault.svc.plus' }}
  # Branches select a complete deployment profile:
  # - pull_request -> sit
  # - main / release/* -> uat
  # - tags (v*) -> prod
  DEPLOY_ENV: ${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}
  VAULT_ENV_PATH: ${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}
  VAULT_ROLE: github-actions-platform-ops-toolkit-${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}
  # 公共服务 secret: 三个环境共读、只读不可改 (GHCR 镜像拉取凭据等)。
  # 拉的是同一批镜像, 不存在环境维度, 不拆分。
  VAULT_KV: kv/data/CICD
  # 基础凭据: 按环境拆分, 各 role 只读自己那份。
  # VULTR_API_KEY / TF_STATE_* / SSH_PRIVATE_DEPLOY_KEY_B64 授予的是"控制基础
  # 设施"和"登录主机"的能力, 是提权的实际载体, 必须隔离 —— sit 失陷不应拿到
  # prod 的云账号与主机私钥。(env 上下文不能在 env: 块内自引用, 故重复三元式)
  VAULT_KV_BASE: kv/data/CICD/${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}
  VAULT_KV_OPENCLAW: kv/data/openclaw
  VAULT_KV_WEB_SAAS: kv/data/WEB_SAAS
  VAULT_KV_DATABASES: kv/data/${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}/databases
  VAULT_KV_AGENT_PROXY: kv/data/${{ github.event_name == 'pull_request' && 'sit' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'uat') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'prod') || github.event.inputs.vault_env_path }}/agent-proxy
  VPS_ROOT: infra/iac_modules/terraform-hcl-standard/vultr-vps
  # 指向 platform-ops-toolkit 的 Terraform 目录
  ENV_DIR: infra/iac_modules/terraform-hcl-standard/vultr-vps/envs/platform-ops-toolkit
  PLAYBOOKS_DIR: infra/playbooks

jobs:
  provision:
    name: Resolve Profile, Provision Environment & Init Secrets
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    outputs:
      deployment_env: ${{ steps.route.outputs.deployment_env }}
      resource_file: ${{ steps.route.outputs.resource_file }}
      terraform_workspace: ${{ steps.route.outputs.terraform_workspace }}
      state_key: ${{ steps.route.outputs.state_key }}
      run_provision_and_deploy: ${{ steps.route.outputs.run_provision_and_deploy }}
      target_domains: ${{ steps.route.outputs.target_domains }}
      terraform_action: ${{ steps.route.outputs.terraform_action }}
      toolkit_action: ${{ steps.route.outputs.toolkit_action }}
      infra_ref: ${{ steps.route.outputs.infra_ref }}
      console_ref: ${{ steps.route.outputs.console_ref }}
      offline_mode: ${{ steps.route.outputs.offline_mode }}
      source_host: ${{ steps.route.outputs.source_host }}
      source_domain_base: ${{ steps.route.outputs.source_domain_base }}
      target_domain_base: ${{ steps.route.outputs.target_domain_base }}
      env_suffix: ${{ steps.route.outputs.env_suffix }}
      confirm_dns_switch: ${{ steps.route.outputs.confirm_dns_switch }}
      vault_env_path: ${{ steps.route.outputs.vault_env_path }}
      hosts: ${{ steps.matrix.outputs.hosts || '[]' }}
      hosts_web_saas: ${{ steps.matrix.outputs.hosts_web_saas || '[]' }}
      hosts_ai_workspace: ${{ steps.matrix.outputs.hosts_ai_workspace || '[]' }}
      hosts_infra_platform: ${{ steps.matrix.outputs.hosts_infra_platform || '[]' }}
      hosts_agent_proxy: ${{ steps.matrix.outputs.hosts_agent_proxy || '[]' }}
      count: ${{ steps.matrix.outputs.count || '0' }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Validate cloud_provider
      # 目前 config/resources/{sit,uat,prod}/*.yaml、Vault 基础凭据(VULTR_API_KEY)、
      # VPS_ROOT/ENV_DIR 全部写死指向 vultr-vps —— 四个业务域都没有 aws-cloud /
      # gcp-cloud / azure-cloud 的资源声明或凭据。选了别的选项如果不在这里拦截,
      # 会静默继续用 vultr-vps 的资源/凭据部署, 而 UI 上却显示选的是别的云 ——
      # 这正是本仓这几天一直在消灭的那类"看起来选对了、实际部署到别的目标"。
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cloud_provider != 'vultr-vps' }}
      run: |
        echo "::error::cloud_provider='${{ github.event.inputs.cloud_provider }}' is not implemented in this workflow yet. Only 'vultr-vps' has resource declarations, credentials, and a wired Terraform module for the four business domains here. Choose vultr-vps, or wire up the other providers before selecting them." >&2
        exit 1

    - name: Route ref to an explicit profile
      id: route
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REF: ${{ github.ref }}
        INPUT_VAULT_ENV_PATH: ${{ github.event.inputs.vault_env_path }}
        INPUT_TARGET_DOMAINS: ${{ github.event.inputs.target_domains }}
        INPUT_RUN_PROVISION_AND_DEPLOY: ${{ github.event.inputs.run_provision_and_deploy }}
        INPUT_ACTION: ${{ github.event.inputs.action }}
        INPUT_INFRA_REF: ${{ github.event.inputs.infra_ref }}
        INPUT_CONSOLE_REF: ${{ github.event.inputs.console_ref }}
        INPUT_OFFLINE_MODE: ${{ github.event.inputs.offline_mode }}
        INPUT_SOURCE_HOST: ${{ github.event.inputs.source_host }}
        INPUT_SOURCE_DOMAIN_BASE: ${{ github.event.inputs.source_domain_base }}
        INPUT_TARGET_DOMAIN_BASE: ${{ github.event.inputs.target_domain_base }}
        INPUT_CONFIRM_DNS_SWITCH: ${{ github.event.inputs.confirm_dns_switch }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_route-ref-to-an-explicit-profile.sh

    - name: Load Vault secrets
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        exportToken: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} VULTR_API_KEY | VULTR_API_KEY ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_BUCKET | TF_STATE_BUCKET ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_REGION | TF_STATE_REGION

    - name: Checkout iac_modules
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/iac_modules
        ref: ${{ steps.route.outputs.infra_ref }}
        path: infra/iac_modules

    - uses: hashicorp/setup-terraform@v4
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      with:
        terraform_version: "1.9.8"

    - uses: actions/setup-python@v6
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      with:
        python-version: "3.12"

    - name: Install render deps
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      run: ${{ github.workspace }}/.github/scripts/platform-ops_provision_install-render-deps.sh

    - name: Map Instance Plan
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      id: plan
      env:
        INPUT_DOMAIN_____ALL_: ${{ github.event.inputs.target_domains || 'all' }}
        INPUT_INSTANCE_PLAN_____4C8G_: ${{ github.event.inputs.instance_plan || '4C8G' }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_map-instance-plan.sh

    - name: generate.py render
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      working-directory: ${{ env.VPS_ROOT }}
      env:
        TARGET_DOMAIN: ${{ steps.route.outputs.target_domains }}
        INSTANCE_PLAN_API: ${{ steps.plan.outputs.api }}
        TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
        TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
        TF_WORKSPACE_PREFIX: env
        TARGET_DOMAIN_BASE: ${{ steps.route.outputs.target_domain_base }}
      run: python3 scripts/generate.py render --resources config/resources/${{ steps.route.outputs.resource_file }}.yaml --workdir envs/platform-ops-toolkit

    - name: Terraform init
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      working-directory: ${{ env.ENV_DIR }}
      env:
        ENV_STEPS_ROUTE_OUTPUTS_STATE_KEY: ${{ steps.route.outputs.state_key }}
        AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
        TF_STATE_BUCKET: ${{ steps.vault.outputs.TF_STATE_BUCKET }}
        TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_terraform-init.sh

    - name: Terraform Apply / Destroy
      if: steps.route.outputs.run_provision_and_deploy == 'true'
      working-directory: ${{ env.ENV_DIR }}
      env:
        AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        TF_VAR_vultr_api_key: ${{ steps.vault.outputs.VULTR_API_KEY }}
        ENV_STEPS_ROUTE_OUTPUTS_TERRAFORM_ACTION: ${{ steps.route.outputs.terraform_action }}
        ENV_STEPS_ROUTE_OUTPUTS_TERRAFORM_WORKSPACE: ${{ steps.route.outputs.terraform_workspace }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_terraform-apply-destroy.sh

    - name: generate.py inventory
      if: steps.route.outputs.run_provision_and_deploy == 'true' && steps.route.outputs.terraform_action == 'apply'
      working-directory: ${{ env.VPS_ROOT }}
      env:
        AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        TARGET_DOMAIN_BASE: ${{ steps.route.outputs.target_domain_base }}
      run: python3 scripts/generate.py inventory --resources config/resources/${{ steps.route.outputs.resource_file }}.yaml --workdir envs/platform-ops-toolkit

    - name: Build deploy matrix
      id: matrix
      if: steps.route.outputs.run_provision_and_deploy == 'true' && steps.route.outputs.terraform_action == 'apply'
      working-directory: ${{ env.ENV_DIR }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_build-deploy-matrix.sh

    - name: Upload CMDB artifact
      if: steps.route.outputs.run_provision_and_deploy == 'true' && steps.route.outputs.terraform_action == 'apply'
      uses: actions/upload-artifact@v7
      with:
        name: platform-ops-toolkit-cmdb
        path: |
          ${{ env.ENV_DIR }}/cmdb.json
          ${{ env.ENV_DIR }}/inventory.ini

    - name: Initialize Databases Credentials
      if: steps.route.outputs.run_provision_and_deploy == 'true' && steps.route.outputs.terraform_action == 'apply'
      env:
        VAULT_ENV_PATH: ${{ steps.route.outputs.vault_env_path }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_initialize-databases-credentials.sh

    - name: Initialize Agent Proxy Credentials
      if: steps.route.outputs.run_provision_and_deploy == 'true' && steps.route.outputs.terraform_action == 'apply'
      env:
        VAULT_ENV_PATH: ${{ steps.route.outputs.vault_env_path }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_provision_initialize-agent-proxy-credentials.sh

  # ---------------------------------------------------------------------------
  # 步骤 2: 基础环境安装 (Bootstrap Deploy)
  # ---------------------------------------------------------------------------
  deploy_base:
    name: Deploy Base Services on ${{ matrix.host }}
    # 只负责 ai-workspace 域 (litellm/qmd/x-memory-hub/postgres/gateway-openclaw 等),
    # 不要对 web-saas / infra-platform 域跑这个全家桶安装器。
    needs: provision
    if: ${{ needs.provision.outputs.run_provision_and_deploy == 'true' && needs.provision.outputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","ai-workspace"]'), needs.provision.outputs.target_domains)  && needs.provision.outputs.hosts_ai_workspace != '[]' }}
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts_ai_workspace) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout xworkspace-console helpers
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-lab/xworkspace-console
        ref: ${{ needs.provision.outputs.console_ref || 'main' }}
        path: xworkspace-console

    - name: Download CMDB
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Load Vault secrets
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
          ${{ env.VAULT_KV }} AI_WORKSPACE_AUTH_TOKEN | AI_WORKSPACE_AUTH_TOKEN

    - name: Configure SSH Key
      env:
        VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_configure_ssh_key.sh

    - name: Wait for host SSH
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_wait_for_host_ssh.sh

    - name: Deploy AI Workspace Compose Stack
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: ${{ github.workspace }}/.github/scripts/platform-ops_deploy_base_deploy-ai-workspace-compose.sh

    - name: Deploy Openclaw & Hermes (Systemd)
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: ${{ github.workspace }}/.github/scripts/platform-ops_deploy_base_deploy-systemd-services.sh


  # ---------------------------------------------------------------------------
  # 步骤 2b: Web SaaS 域服务部署 (postgresql / stunnel / accounts / billing / console)
  # 单机部署: 所有 web-saas 服务都跑在同一台 provision 出来的主机上, 所以需要先
  # 补上生产环境里各服务各自假设"已经存在"的共享前置条件:
  #   - cn-toolkit-shared Docker 网络 (没有任何 playbook 会创建它, 全靠约定已存在)
  #   - stunnel 自签证书 (postgresql_service 角色如果证书缺失会直接 fail)
  #   - account 库 / account_user 账号 (全新 Postgres 实例, 需要先建库建用户)
  # 所有 web-saas 专属密钥集中放在 kv/data/WEB_SAAS (人工维护, 不再自动生成/
  # 写回): POSTGRES_ROOT_PASSWORD, ACCOUNT_DB_PASSWORD, BILLING_DATABASE_URL,
  # INTERNAL_SERVICE_TOKEN。
  # GHCR 私有镜像凭据不在 WEB_SAAS, 而是跟其它 CI 通用凭据一起放在
  # kv/data/CICD: GHCR_USERNAME 直接同名取, 密码键名是 GHCR_TOKEN, 映射为
  # 各脚本统一消费的 GHCR_PASSWORD。
  # ---------------------------------------------------------------------------
  deploy_web_saas:
    name: Deploy Web SaaS Services on ${{ matrix.host }}
    needs: provision
    if: ${{ needs.provision.outputs.run_provision_and_deploy == 'true' && needs.provision.outputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","web-saas"]'), needs.provision.outputs.target_domains)  && needs.provision.outputs.hosts_web_saas != '[]' }}
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts_web_saas) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout playbooks
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/playbooks
        ref: ${{ needs.provision.outputs.infra_ref }}
        path: playbooks

    - name: Checkout billing-service
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-services/billing-service
        ref: main
        path: billing-service

    - name: Download CMDB
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Load Vault secrets
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
          ${{ env.VAULT_KV_WEB_SAAS }} BILLING_DATABASE_URL | BILLING_DATABASE_URL ;
          ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
          ${{ env.VAULT_KV }} GHCR_USERNAME | GHCR_USERNAME ;
          ${{ env.VAULT_KV }} GHCR_TOKEN | GHCR_PASSWORD ;
          ${{ env.VAULT_KV_WEB_SAAS }} ACCOUNT_DB_PASSWORD | ACCOUNT_PG_PASSWORD ;
          ${{ env.VAULT_KV_WEB_SAAS }} POSTGRES_ROOT_PASSWORD | POSTGRES_ROOT_PASSWORD

    - name: Validate environment-scoped web-saas secrets
      env:
        MATRIX_HOST: ${{ matrix.host }}
        BILLING_DATABASE_URL: ${{ steps.vault.outputs.BILLING_DATABASE_URL }}
        INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
        GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        ACCOUNT_PG_PASSWORD: ${{ steps.vault.outputs.ACCOUNT_PG_PASSWORD }}
        POSTGRES_ROOT_PASSWORD: ${{ steps.vault.outputs.POSTGRES_ROOT_PASSWORD }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_validate-environment-scoped-web-saas-secrets.sh

    - name: Configure SSH Key
      env:
        VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_configure_ssh_key.sh

    - name: Wait for host SSH
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_wait_for_host_ssh.sh

    - name: Install Ansible
      run: ${{ github.workspace }}/.github/scripts/common_install_ansible.sh

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25"

    - name: Build billing-service binary
      working-directory: billing-service
      env:
        CGO_ENABLED: "0"
        GOOS: linux
        GOARCH: amd64
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_build-billing-service-binary.sh

    - name: Bootstrap Docker + Caddy + shared network + stunnel certs
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_bootstrap-docker-caddy-shared-network-stunnel-certs.sh

    - name: Checkout postgresql.svc.plus
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-services/postgresql.svc.plus
        ref: main
        path: postgresql-svc-plus

      # postgresql_service 角色默认假设 postgres-extensions:17 这个镜像已经在目标
      # 主机本地存在 (postgresql_service_postgres_pull_image 默认 false)。这不是
      # 任何公开镜像, 是 postgresql.svc.plus 自己仓库里编译 pgvector/pg_jieba/pgmq
      # 的自定义镜像 (deploy/base-images/postgres-runtime-wth-extensions.Dockerfile),
      # 从没发布到任何 registry。全新主机上本地没有这个镜像, compose up 会尝试去
      # Docker Hub 拉 "postgres-extensions" 从而 404/403。
      # 在 runner 上构建一次 (跟 billing-service 二进制同一个思路: 自己编译,
      # 不依赖外部产物), 再用 docker save | ssh docker load 灌进目标主机。
    - name: Build postgres-extensions image
      working-directory: postgresql-svc-plus
      run: ${{ github.workspace }}/.github/scripts/common_build_postgres_extensions.sh

    - name: Ship postgres-extensions image to host
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_ship_postgres_extensions.sh

      # postgresql_service 角色的 stunnel 端镜像 ghcr.io/x-evor/stunnel-server
      # 是 GHCR 私有包 (镜像源码已收编进 x-evor/artifacts oci/stunnel-server,
      # 由其 CI 构建发布), 全新主机没有登录态, compose up 隐式 pull 直接
      # unauthorized。在目标主机上先用 WEB_SAAS 的 GHCR 凭据 docker login,
      # 之后 stunnel / accounts 等私有镜像的拉取都能通过。
    - name: Log target host into GHCR
      env:
        GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
        GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_docker_login_ghcr.sh

    - name: Deploy postgresql.svc.plus
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
        POSTGRES_ROOT_PASSWORD: ${{ steps.vault.outputs.POSTGRES_ROOT_PASSWORD }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_deploy_postgresql.sh

    - name: Deploy stunnel-client
      working-directory: playbooks
      env:
        MATRIX_HOST: ${{ matrix.host }}
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_deploy-stunnel-client.sh

      # web-saas 主机跑的是自己独立的 postgres 实例 (与 infra-platform 的
      # postgres 是两台不同主机), 这台上的 account/litellm/rag 等库和专属
      # 账号从未有人建过; vault-dataflow 重构只把这一步留在了
      # deploy_infra_platform job 里, 导致 web-saas 独立部署时 account 库
      # 一直不存在, "Initialize account schema when absent" 直接
      # "database account does not exist"。
      # create_databases_and_users.yml 的密码解析优先级是 Env > Vault > 自动生成,
      # 而 Vault 侧的读取/写回都要求 create_databases_and_users.yml 内部拿到一个
      # 可用的 vault_token 才会执行 (它自己再单独认证一次 Vault, 与本 job 的
      # "Load Vault secrets" 是两条独立通路) —— 目前这条通路没有打通, 与其
      # 依赖它, 不如直接把 ACCOUNT_DB_PASSWORD 这个已经在用的固定 Vault 密钥
      # (kv/data/WEB_SAAS, 上面 "Load Vault secrets" 已经安全取出) 作为 Env
      # 层显式传入, 建库和 accounts 容器两边用同一个值, 完全不依赖 Vault
      # 读写是否打通。
    - name: Provision account database and role
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        ACCOUNT_PG_PASSWORD: ${{ steps.vault.outputs.ACCOUNT_PG_PASSWORD }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_provision_databases_and_roles.sh

    - name: Checkout accounts.svc.plus
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-services/accounts
        ref: main
        path: accounts-svc-plus

      # deploy-only 模式不做数据迁移, 全新 account 库没有任何表, accounts
      # 服务启动即 "relation users does not exist" 崩溃循环。schema.sql 是
      # drop+recreate 的基线, 只允许在 users 表不存在时初始化一次, 绝不能
      # 在已有数据的库上重跑。
    - name: Initialize account schema when absent
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_initialize-account-schema-when-absent.sh

    - name: Deploy accounts.svc.plus
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        ACCOUNTS_PULL_IMAGE: "true"
          # ghcr.io/x-evor/accounts 也是私有镜像; accounts_service 角色会读
          # GHCR_USERNAME/GHCR_PASSWORD 在目标主机上 docker login 后再 pull
        GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
        GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        ACCOUNT_PG_PASSWORD: ${{ steps.vault.outputs.ACCOUNT_PG_PASSWORD }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_deploy-accounts-svc-plus.sh

    - name: Deploy billing-service
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        BILLING_DATABASE_URL: ${{ steps.vault.outputs.BILLING_DATABASE_URL }}
        INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_deploy-billing-service.sh

    - name: Deploy console.svc.plus
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
        GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_deploy-console-svc-plus.sh

    - name: Deploy Vault (Co-located on Web SaaS)
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_web_saas_deploy-vault-co-located-on-web-saas.sh

    - name: Deploy Monitoring Agents (Vector/Node/Process)
      working-directory: playbooks
      env:
        MATRIX_HOST: ${{ matrix.host }}
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_deploy_monitoring_agents.sh

  # ---------------------------------------------------------------------------
  # 步骤 2c: Open Platform 域服务部署 (caddy / docker / postgres / gitea / zitadel / observability)
  # ---------------------------------------------------------------------------
  deploy_infra_platform:
    name: Deploy Open Platform Services on ${{ matrix.host }}
    needs: provision
    if: ${{ needs.provision.outputs.run_provision_and_deploy == 'true' && needs.provision.outputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","infra-platform"]'), needs.provision.outputs.target_domains)  && needs.provision.outputs.hosts_infra_platform != '[]' }}
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts_infra_platform) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout playbooks
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/playbooks
        ref: ${{ needs.provision.outputs.infra_ref }}
        path: playbooks

    - name: Download CMDB
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Load Vault secrets
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
          ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
          ${{ env.VAULT_KV }} GHCR_USERNAME | GHCR_USERNAME ;
          ${{ env.VAULT_KV }} GHCR_TOKEN | GHCR_PASSWORD ;
          ${{ env.VAULT_KV_WEB_SAAS }} POSTGRES_ROOT_PASSWORD | POSTGRES_ROOT_PASSWORD

    - name: Configure SSH Key
      env:
        VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_configure_ssh_key.sh

    - name: Wait for host SSH
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_wait_for_host_ssh.sh

    - name: Deploy Infra Platform Compose Stack
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: ${{ github.workspace }}/.github/scripts/platform-ops_deploy_infra_platform_deploy-compose.sh

    - name: Deploy Monitoring Agents (Vector/Node/Process)
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_deploy_monitoring_agents.sh

  # ---------------------------------------------------------------------------
  # 步骤 2d: Agent Proxy 域服务部署 (caddy / xray / xray-exporter / vector / agent-svc-plus)
  # ---------------------------------------------------------------------------
  deploy_agent_proxy:
    name: Deploy Agent Proxy Services on ${{ matrix.host }}
    needs: provision
    if: ${{ needs.provision.outputs.run_provision_and_deploy == 'true' && needs.provision.outputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","agent-proxy"]'), needs.provision.outputs.target_domains)  && needs.provision.outputs.hosts_agent_proxy != '[]' }}
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts_agent_proxy) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout playbooks
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/playbooks
        ref: ${{ needs.provision.outputs.infra_ref }}
        path: playbooks

    - name: Download CMDB
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Load Vault secrets
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
          ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
          ${{ env.VAULT_KV_AGENT_PROXY }} xray_uuid | XRAY_UUID

    - name: Configure SSH Key
      run: |-
        ${{ github.workspace }}/.github/scripts/common_configure_ssh_key.sh

    - name: Wait for host SSH
      env:
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_wait_for_host_ssh.sh

    - name: Install Ansible
      run: ${{ github.workspace }}/.github/scripts/common_install_ansible.sh

    - name: Bootstrap Caddy + Xray on Agent Proxy Node
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_agent_proxy_bootstrap-caddy-xray-on-agent-proxy-node.sh

    - name: Deploy agent-svc-plus
      working-directory: playbooks
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        XRAY_UUID: ${{ steps.vault.outputs.XRAY_UUID }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_agent_proxy_deploy-agent-svc-plus.sh

    - name: Deploy xray-exporter
      working-directory: playbooks
      env:
        VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_deploy_agent_proxy_deploy-xray-exporter.sh

    - name: Deploy Monitoring Agents (Vector/Node/Process)
      working-directory: playbooks
      env:
        PROVISION_TOOLKIT_ACTION: ${{ needs.provision.outputs.toolkit_action }}
        PROVISION_SOURCE_DOMAIN_BASE: ${{ needs.provision.outputs.source_domain_base }}
        PROVISION_TARGET_DOMAINS: ${{ needs.provision.outputs.target_domains }}
        PROVISION_SOURCE_HOST: ${{ needs.provision.outputs.source_host }}
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_ENV_SUFFIX: ${{ needs.provision.outputs.env_suffix }}
        MATRIX_HOST: ${{ matrix.host }}
      run: |-
        ${{ github.workspace }}/.github/scripts/common_deploy_monitoring_agents.sh

  # ---------------------------------------------------------------------------
  # 步骤 3: 全站单向数据流迁移与环境恢复 (Data Migration)
  # ---------------------------------------------------------------------------
  data_migration:
    name: Migrate Site Data (Source -> Target)
    needs: [provision, deploy_base, deploy_web_saas, deploy_infra_platform, deploy_agent_proxy]
    if: ${{ always() && (needs.deploy_base.result == 'success' || needs.deploy_base.result == 'skipped') && (needs.deploy_web_saas.result == 'success' || needs.deploy_web_saas.result == 'skipped') && (needs.deploy_infra_platform.result == 'success' || needs.deploy_infra_platform.result == 'skipped') && (needs.deploy_agent_proxy.result == 'success' || needs.deploy_agent_proxy.result == 'skipped') && needs.provision.outputs.terraform_action == 'apply' && needs.provision.outputs.toolkit_action != 'deploy' }}
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    steps:
    - name: Download CMDB
        # 只在 provision 运行的情况下下载
      if: ${{ github.event.inputs.run_provision_and_deploy == 'true' }}
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Checkout playbooks
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/playbooks
        ref: ${{ github.event.inputs.infra_ref }}
        path: playbooks

    - name: Install Ansible
      run: ${{ github.workspace }}/.github/scripts/common_install_ansible.sh

    - name: Load Vault secrets for SSH
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV_BASE }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_BUCKET | MIGRATION_S3_BUCKET ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_ACCESS_KEY | MIGRATION_S3_ACCESS_KEY ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_SECRET_KEY | MIGRATION_S3_SECRET_KEY ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_REGION | MIGRATION_S3_REGION ;
          ${{ env.VAULT_KV_BASE }} TF_STATE_ENDPOINT | MIGRATION_S3_ENDPOINT ;

    - name: Configure SSH Key
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_data_migration_configure-ssh-key.sh

    - name: Run Toolkit Action (${{ needs.provision.outputs.toolkit_action }})
      working-directory: platform-ops-toolkit
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
        ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        MIGRATION_S3_BUCKET: ${{ steps.vault.outputs.MIGRATION_S3_BUCKET }}
        MIGRATION_S3_ACCESS_KEY: ${{ steps.vault.outputs.MIGRATION_S3_ACCESS_KEY }}
        MIGRATION_S3_SECRET_KEY: ${{ steps.vault.outputs.MIGRATION_S3_SECRET_KEY }}
        MIGRATION_S3_REGION: ${{ steps.vault.outputs.MIGRATION_S3_REGION }}
        MIGRATION_S3_ENDPOINT: ${{ steps.vault.outputs.MIGRATION_S3_ENDPOINT }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_data_migration_run-toolkit-action-needs-provision-outputs-toolkit-action.sh

  switch_dns:
    name: Switch DNS Traffic (Manual Approval)
    needs: [provision, deploy_base, deploy_web_saas, deploy_infra_platform, deploy_agent_proxy, data_migration]
    if: |
      always() &&
      needs.provision.outputs.terraform_action == 'apply' &&
      (github.event.inputs.confirm_dns_switch == 'true' || github.event.inputs.confirm_dns_switch == true) &&
      (needs.provision.result == 'success' || needs.provision.result == 'skipped') &&
      (needs.deploy_base.result == 'success' || needs.deploy_base.result == 'skipped') &&
      (needs.deploy_web_saas.result == 'success' || needs.deploy_web_saas.result == 'skipped') &&
      (needs.deploy_infra_platform.result == 'success' || needs.deploy_infra_platform.result == 'skipped') &&
      (needs.deploy_agent_proxy.result == 'success' || needs.deploy_agent_proxy.result == 'skipped') &&
      (needs.data_migration.result == 'success' || needs.data_migration.result == 'skipped')
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    environment: production
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Download CMDB
      if: ${{ github.event.inputs.run_provision_and_deploy == 'true' }}
      uses: actions/download-artifact@v8
      with:
        name: platform-ops-toolkit-cmdb
        path: cmdb

    - name: Checkout playbooks
      uses: actions/checkout@v7
      with:
        repository: ai-workspace-infra/playbooks
        ref: ${{ github.event.inputs.infra_ref }}
        path: playbooks

    - name: Install Ansible
      run: ${{ github.workspace }}/.github/scripts/common_install_ansible.sh

    - name: Load Vault secrets for DNS
      id: vault
      uses: hashicorp/vault-action@v4
      with:
        url: ${{ env.VAULT_ADDR }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        jwtGithubAudience: vault
        ignoreNotFound: true
        secrets: |
          ${{ env.VAULT_KV }} CLOUDFLARE_DNS_API_TOKEN | CLOUDFLARE_DNS_API_TOKEN ;
          ${{ env.VAULT_KV_AGENT_PROXY }} xray_uuid | XRAY_UUID

    - name: Switch Cloudflare DNS Records
      env:
        CLOUDFLARE_DNS_API_TOKEN: ${{ steps.vault.outputs.CLOUDFLARE_DNS_API_TOKEN }}
        PROVISION_TARGET_DOMAIN_BASE: ${{ needs.provision.outputs.target_domain_base }}
        PROVISION_SOURCE_DOMAIN_BASE: ${{ needs.provision.outputs.source_domain_base }}
        INPUT_RUN_PROVISION_AND_DEPLOY: ${{ github.event.inputs.run_provision_and_deploy }}
      run: |-
        ${{ github.workspace }}/.github/scripts/platform-ops_switch_dns_switch-cloudflare-dns-records.sh
