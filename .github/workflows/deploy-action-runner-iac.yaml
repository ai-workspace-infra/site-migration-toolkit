name: Deploy Action Runner (IaC + Ansible)

on:
  workflow_dispatch:
    inputs:
      infra_ref:
        description: "ai-workspace-infra git ref (iac_modules + playbooks)"
        required: false
        default: "main"
        type: string
      runner_engine:
        description: "Runner 类型 (github 或 gitea)"
        required: true
        default: "github"
        type: choice
        options: ["github", "gitea"]
      github_org_repo:
        description: "GitHub 组织/仓库 (如 ai-workspace-infra, 仅 github 适用)"
        required: false
        default: "ai-workspace-infra"
        type: string
      gitea_instance_url:
        description: "Gitea 实例地址 (如 https://gitea.svc.plus, 仅 gitea 适用)"
        required: false
        default: "https://gitea.svc.plus"
        type: string
      terraform_action:
        description: "apply 创建/更新，destroy 销毁"
        required: false
        default: "apply"
        type: choice
        options: [apply, destroy]
      vault_env_path:
        description: "Vault 环境路径 (如 sit, uat, prod)，对应不同环境的 runner"
        required: true
        default: "uat"
        type: choice
        options: ["sit", "uat", "prod"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-action-runner-iac
  cancel-in-progress: false

env:
  VAULT_ADDR: https://vault.svc.plus
  VAULT_ROLE: github-actions-platform-ops-toolkit-${{ github.event.inputs.vault_env_path }}
  VAULT_KV: kv/data/CICD
  VAULT_KV_ACTION_RUNNER: kv/data/${{ github.event.inputs.vault_env_path }}/action-runner
  VPS_ROOT: infra/iac_modules/terraform-hcl-standard/vultr-vps
  ENV_DIR: infra/iac_modules/terraform-hcl-standard/vultr-vps/envs/platform-ops-toolkit
  PLAYBOOKS_DIR: infra/playbooks

jobs:
  provision:
    name: Provision Runner Resources
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.matrix.outputs.hosts }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - name: Load Vault secrets (OIDC)
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} VULTR_API_KEY | VULTR_API_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
            ${{ env.VAULT_KV }} TF_STATE_BUCKET | TF_STATE_BUCKET ;
            ${{ env.VAULT_KV }} TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_REGION | TF_STATE_REGION

      - name: Checkout iac_modules
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/iac_modules
          ref: ${{ github.event.inputs.infra_ref || 'main' }}
          path: infra/iac_modules

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install render deps
        run: pip install --quiet pyyaml jinja2

      - name: generate.py render (YAML -> 显式 HCL)
        working-directory: ${{ env.VPS_ROOT }}
        env:
          TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
          TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
        run: python3 scripts/generate.py render --resources config/resources/${{ github.event.inputs.vault_env_path }}/action-runner.yaml --workdir envs/action-runner

      - name: Terraform init
        working-directory: ${{ env.VPS_ROOT }}/envs/action-runner
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
          TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
          TF_STATE_BUCKET: ${{ steps.vault.outputs.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=action-runner-${{ github.event.inputs.vault_env_path }}/terraform.tfstate" \
            -backend-config="region=${TF_STATE_REGION}"

      - name: Terraform ${{ github.event.inputs.terraform_action }}
        working-directory: ${{ env.VPS_ROOT }}/envs/action-runner
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
          TF_VAR_vultr_api_key: ${{ steps.vault.outputs.VULTR_API_KEY }}
        run: |
          terraform ${{ github.event.inputs.terraform_action }} -auto-approve -input=false

      - name: generate.py inventory (terraform output + YAML -> cmdb.json + inventory.ini)
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.VPS_ROOT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        run: python3 scripts/generate.py inventory --resources config/resources/${{ github.event.inputs.vault_env_path }}/action-runner.yaml --workdir envs/action-runner

      - name: Build deploy matrix from cmdb.json
        id: matrix
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.VPS_ROOT }}/envs/action-runner
        run: |
          hosts="$(jq -c 'keys' cmdb.json)"
          echo "hosts=${hosts}" >> "$GITHUB_OUTPUT"
          echo "count=$(jq 'length' cmdb.json)" >> "$GITHUB_OUTPUT"

      - name: Upload CMDB + inventory artifact
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        uses: actions/upload-artifact@v7
        with:
          name: action-runner-cmdb
          path: |
            ${{ env.VPS_ROOT }}/envs/action-runner/cmdb.json
            ${{ env.VPS_ROOT }}/envs/action-runner/inventory.ini

  deploy:
    name: Deploy Runner on ${{ matrix.host }}
    needs: provision
    if: ${{ needs.provision.outputs.count != '0' && github.event.inputs.terraform_action == 'apply' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref || 'main' }}
          path: playbooks

      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: action-runner-cmdb
          path: cmdb

      - name: Load Vault secrets
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV_ACTION_RUNNER }} GITHUB_RUNNER_TOKEN | GITHUB_RUNNER_TOKEN ;
            ${{ env.VAULT_KV_ACTION_RUNNER }} GITEA_RUNNER_TOKEN | GITEA_RUNNER_TOKEN

      - name: Configure SSH Key
        env:
          VAULT_ANSIBLE_SSH_KEY_B64: ${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}
        run: |-
          ${{ github.workspace }}/.github/scripts/common_configure_ssh_key.sh

      - name: Wait for host SSH
        env:
          MATRIX_HOST: ${{ matrix.host }}
        run: |-
          ${{ github.workspace }}/.github/scripts/common_wait_for_host_ssh.sh

      - name: Install Ansible
        run: ${{ github.workspace }}/.github/scripts/common_install_ansible.sh

      - name: Deploy Action Runner
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          MATRIX_HOST: ${{ matrix.host }}
          RUNNER_ENGINE: ${{ github.event.inputs.runner_engine }}
          GITHUB_ORG_REPO: ${{ github.event.inputs.github_org_repo }}
          GITHUB_RUNNER_TOKEN: ${{ steps.vault.outputs.GITHUB_RUNNER_TOKEN }}
          GITEA_INSTANCE_URL: ${{ github.event.inputs.gitea_instance_url }}
          GITEA_RUNNER_TOKEN: ${{ steps.vault.outputs.GITEA_RUNNER_TOKEN }}
        run: ${{ github.workspace }}/.github/scripts/platform-ops_deploy_action_runner.sh
