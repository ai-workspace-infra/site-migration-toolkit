name: Check IaaS Ready

on:
  workflow_dispatch:
    inputs:
      toolkit_ref:
        description: "platform-ops-toolkit 仓库的 Git Ref (例如 main, v1.0.0)。用于跨 Tag 触发时拉取指定代码"
        required: false
        type: string
      workflows:
        description: "Comma-separated workflow filenames to check"
        required: true
        type: string
      branch:
        description: "Branch to check"
        default: main
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.toolkit_ref || '' }}

    - name: Check workflows status
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WORKFLOWS: ${{ inputs.workflows }}
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ github.repository }}
      run: |-
        .github/scripts/check-iaas-ready_check_check-workflows-status.sh
