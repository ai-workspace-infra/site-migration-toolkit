name: Validate Release PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sec-qa-gate:
    name: Sec QA Gate (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout (full history)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install gitleaks
      run: |-
        .github/scripts/validate-release-pr_sec-qa-gate_install-gitleaks.sh

    - name: Run gitleaks detect
      run: .github/scripts/validate-release-pr_sec-qa-gate_run-gitleaks-detect.sh

  workflow-gating:
    name: Workflow Gating Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install PyYAML
      run: pip install --quiet pyyaml

    # A broken job condition never fails a run -- it shows up as `skipped`,
    # which is indistinguishable from "deliberately not requested". These
    # invariants have to be asserted, because review does not catch them.
    - name: Verify job gating is falsifiable
      run: python3 scripts/ci/workflow_gating_verify.py
