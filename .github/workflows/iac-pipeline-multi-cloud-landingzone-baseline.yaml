name: Multi Cloud LandingZone Baseline

on:
  push:
  pull_request:
    paths:
      - 'terraform-hcl-standard/**'
      - '.github/workflows/iac-pipeline-multi-cloud-landingzone-baseline.yaml'
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_action:
        description: "Deployment action"
        type: choice
        options: [plan, apply, destroy]
        default: plan
      deploy_dry_run:
        description: "Dry-run mode"
        type: choice
        options: ['true', 'false']
        default: 'true'
      project:
        description: "环境(项目) / Project (Base Domain)"
        type: string
        default: svc.plus
      vault_env_path:
        description: "Vault environment (e.g. sit, uat, prod)"
        type: choice
        options: [sit, uat, prod]
        default: sit
      cloud_provider:
        description: "服务商 / Cloud Provider"
        type: choice
        options: [aws-cloud, gcp-cloud, vultr-vps]
        default: aws-cloud
      gitops_repo_name:
        description: "GitOps repository (URL or owner/repo)"
        type: string
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        description: "GitOps repo ref (branch/tag/sha) to use"
        type: string
        default: main
  workflow_call:
    inputs:
      deploy_action:
        type: string
        required: false
        default: plan
      deploy_dry_run:
        type: string
        required: false
        default: 'true'
      project:
        type: string
        required: false
        default: svc.plus
      vault_env_path:
        type: string
        required: false
        default: sit
      cloud_provider:
        type: string
        required: false
        default: aws-cloud
      gitops_repo_name:
        type: string
        required: false
        default: https://github.com/cloud-neutral-workshop/gitops.git
      gitops_repo_ref:
        type: string
        required: false
        default: main
    secrets:
      SMTP_PASSWORD:
        required: false

permissions:
  id-token: write
  contents: read

env:
  PROJECT: ${{ inputs.project || github.event.inputs.project || 'svc.plus' }}
  CLOUD_PROVIDER: ${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}
  DEPLOY_ENV: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}
  DEPLOY_ACTION: ${{ inputs.deploy_action || github.event.inputs.deploy_action || 'plan' }}
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::950604983695:role/GithubAction_IAC_Deploy_Role
  GITOPS_REPO_ROOT: gitops
  TF_WORKDIR: iac_modules/terraform-hcl-standard/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}/component/landingzone
  CONFIG_DIR: gitops/${{ inputs.project || github.event.inputs.project || 'svc.plus' }}/${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' && 'uat' || ((startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'sit')) || inputs.vault_env_path || github.event.inputs.vault_env_path || 'sit' }}/${{ inputs.cloud_provider || github.event.inputs.cloud_provider || 'aws-cloud' }}

jobs:
  landingzone:
    name: "Deploy LandingZone Baseline"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Toolkit
        uses: actions/checkout@v4

      - name: Checkout iac_modules
        uses: actions/checkout@v4
        with:
          repository: ai-workspace-infra/iac_modules
          path: iac_modules

      - name: Load Vault secrets
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.svc.plus
          method: jwt
          role: github-actions-platform-ops-toolkit-${{ env.DEPLOY_ENV }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          exportToken: true
          secrets: |
            kv/data/CICD TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
            kv/data/CICD TF_STATE_BUCKET | TF_STATE_BUCKET ;
            kv/data/CICD TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
            kv/data/CICD TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
            kv/data/CICD TF_STATE_REGION | TF_STATE_REGION

      - name: Setup IaC Environment
        uses: ./.github/actions/setup-iac-env
        with:
          gitops_repo_name: ${{ inputs.gitops_repo_name || github.event.inputs.gitops_repo_name || 'https://github.com/cloud-neutral-workshop/gitops.git' }}
          gitops_repo_ref: ${{ inputs.gitops_repo_ref || github.event.inputs.gitops_repo_ref || 'main' }}
          gitops_target_path: ${{ env.GITOPS_REPO_ROOT }}
          aws_region: ${{ env.AWS_REGION }}
          aws_role_arn: ${{ env.AWS_ROLE_ARN }}

      - name: Terraform Init (LandingZone)
        working-directory: ${{ env.TF_WORKDIR }}
        env:
          TF_CLI_ARGS_init: >-
            -backend-config="endpoint=${{ steps.vault.outputs.TF_STATE_ENDPOINT }}"
            -backend-config="bucket=${{ steps.vault.outputs.TF_STATE_BUCKET }}"
            -backend-config="key=${{ env.PROJECT }}/${{ env.DEPLOY_ENV }}/${{ env.CLOUD_PROVIDER }}/landingzone/terraform.tfstate"
            -backend-config="access_key=${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}"
            -backend-config="secret_key=${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}"
            -backend-config="region=${{ steps.vault.outputs.TF_STATE_REGION }}"
            -backend-config="skip_credentials_validation=true"
            -backend-config="skip_metadata_api_check=true"
            -backend-config="skip_region_validation=true"
            -backend-config="use_path_style=true"
        run: make init CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

      - name: Terraform Plan (LandingZone)
        id: tfplan
        if: env.DEPLOY_ACTION == 'plan'
        working-directory: ${{ env.TF_WORKDIR }}
        run: make plan CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }} > plan_output.txt

      - name: Upload LandingZone Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: landingzone-plan
          path: ${{ env.TF_WORKDIR }}/plan_output.txt

      - name: Terraform Apply (LandingZone)
        if: env.DEPLOY_ACTION == 'apply'
        working-directory: ${{ env.TF_WORKDIR }}
        run: make apply CONFIG_DIR=../../../../../${{ env.CONFIG_DIR }}

  validation:
    name: "Validate LandingZone Baseline"
    needs: landingzone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Toolkit
        uses: actions/checkout@v4

      - name: Checkout iac_modules
        uses: actions/checkout@v4
        with:
          repository: ai-workspace-infra/iac_modules
          path: iac_modules

      - name: Run Validation Checks
        run: |
          echo "⚙️ Running LandingZone baseline validation..."
          chmod +x iac_modules/scripts/validation/validate-landingzone.sh
          iac_modules/scripts/validation/validate-landingzone.sh ${{ env.TF_WORKDIR }}

  delivery:
    name: "Delivery: Notify Rollout"
    needs: validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Toolkit
        uses: actions/checkout@v4

      - name: Checkout iac_modules
        uses: actions/checkout@v4
        with:
          repository: ai-workspace-infra/iac_modules
          path: iac_modules

      - name: Notify
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USERNAME: "manbuzhe2009@qq.com"
        run: |
          echo "📣 Sending LandingZone rollout notification..."
          chmod +x iac_modules/scripts/notifications/notify-landingzone.sh
          iac_modules/scripts/notifications/notify-landingzone.sh
