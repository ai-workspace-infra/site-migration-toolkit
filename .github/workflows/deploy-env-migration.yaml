name: Deploy Environment & Migrate Data (Data Sync)

# =============================================================================
# IaC ↔ 数据流单向迁移流水线 (Site Recovery)
# 1. 动态 Provision (基于 Terraform 创建新环境 site-migration-toolkit)
# 2. 部署基础服务 (Bootstrap 部署，跑空环境)
# 3. 生产环境克隆与单向同步 (通过 site_migration Ansible 角色)
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      infra_ref:
        description: "iac_modules & playbooks 仓库共用的 Git Ref (分支名或 Tag 均可)"
        required: false
        default: "main"
        type: string
      source_host:
        description: "源环境 IP 或域名 (用于导出数据)"
        required: true
        default: "install.svc.plus"
        type: string
      source_domain_base:
        description: "源环境域名后缀 (例如 svc.plus)"
        required: true
        default: "svc.plus"
        type: string
      target_domain_base:
        description: "新环境域名后缀 (用于参数化替换，如 onwalk.net)"
        required: true
        default: "onwalk.net"
        type: string
      run_provision_and_deploy:
        description: "是否执行 Provision 和基础环境 Deploy? (如果只迁移数据则取消勾选)"
        required: false
        default: true
        type: boolean
      target_domains:
        description: "选择要执行的业务域 (Business Domain)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ai-workspace
          - web-saas
          - infra-platform
          - agent-proxy
      instance_plan:
        description: "选择 VPS 规格 (全域建议 4C8G，单域支持 2C4G 矩阵)"
        required: true
        default: "4C8G"
        type: choice
        options:
          - 4C8G
          - 2C4G
      toolkit_action:
        description: "Toolkit 执行动作 (deploy = 仅在新环境部署全部服务，不执行数据迁移)"
        required: false
        default: "migrate"
        type: choice
        options: [migrate, backup, restore, deploy]
      terraform_action:
        description: "apply 创建/更新，destroy 销毁"
        required: false
        default: "apply"
        type: choice
        options: [apply, destroy]
      confirm_dns_switch:
        description: "危险: 勾选此项将在最后一步接管原域名的生产流量 (仅真实灾备启用)"
        required: false
        default: false
        type: boolean
      vault_env_path:
        description: "Vault 环境路径 (如 uat, prod)，用于动态 secrets 的读写"
        required: true
        default: "uat"
        type: string
      vault_addr:
        description: "Vault 服务地址 (可选，覆盖默认的 https://vault.svc.plus)"
        required: false
        type: string
      vault_token:
        description: "Vault 管理员 Token (可选，仅在需要跳过 JWT 登录或 JWT 异常时作为兜底使用)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-env-migration
  cancel-in-progress: false

env:
  VAULT_ADDR: ${{ github.event.inputs.vault_addr || 'https://vault.svc.plus' }}
  VAULT_ENV_PATH: ${{ github.event.inputs.vault_env_path }}
  VAULT_ROLE: github-actions-site-migration-toolkit
  VAULT_KV: kv/data/CICD
  VAULT_KV_OPENCLAW: kv/data/openclaw
  VAULT_KV_WEB_SAAS: kv/data/WEB_SAAS
  VAULT_KV_DATABASES: kv/data/${{ github.event.inputs.vault_env_path }}/databases
  VAULT_KV_AGENT_PROXY: kv/data/${{ github.event.inputs.vault_env_path }}/agent-proxy
  VPS_ROOT: infra/iac_modules/terraform-hcl-standard/vultr-vps
  # 指向 site-migration-toolkit 的 Terraform 目录
  ENV_DIR: infra/iac_modules/terraform-hcl-standard/vultr-vps/envs/site-migration-toolkit
  PLAYBOOKS_DIR: infra/playbooks

jobs:
  # ---------------------------------------------------------------------------
  # 步骤 1: 基础设施配置与启动 (Provision)
  # ---------------------------------------------------------------------------
  provision:
    name: Provision New Environment (Terraform)
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.matrix.outputs.hosts }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - name: Load Vault secrets
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} VULTR_API_KEY | VULTR_API_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_ENDPOINT | TF_STATE_ENDPOINT ;
            ${{ env.VAULT_KV }} TF_STATE_BUCKET | TF_STATE_BUCKET ;
            ${{ env.VAULT_KV }} TF_STATE_ACCESS_KEY | TF_STATE_ACCESS_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_SECRET_KEY | TF_STATE_SECRET_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_REGION | TF_STATE_REGION

      - name: Checkout iac_modules
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/iac_modules
          ref: ${{ github.event.inputs.infra_ref }}
          path: infra/iac_modules

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install render deps
        run: pip install --quiet pyyaml jinja2

      - name: Map Instance Plan
        id: plan
        run: |
          if [ "${{ github.event.inputs.instance_plan }}" == "2C4G" ]; then
            echo "api=vc2-2c-4gb" >> "$GITHUB_OUTPUT"
          else
            echo "api=vc2-4c-8gb" >> "$GITHUB_OUTPUT"
          fi

      - name: generate.py render
        working-directory: ${{ env.VPS_ROOT }}
        env:
          TARGET_DOMAIN: ${{ github.event.inputs.target_domains }}
          INSTANCE_PLAN_API: ${{ steps.plan.outputs.api }}
          TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
          TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
          TF_WORKSPACE_PREFIX: env
        run: python3 scripts/generate.py render --resources config/resources/${{ github.event.inputs.target_domains }}.yaml --workdir envs/site-migration-toolkit

      - name: Terraform init
        working-directory: ${{ env.ENV_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
          TF_STATE_ENDPOINT: ${{ steps.vault.outputs.TF_STATE_ENDPOINT }}
          TF_STATE_BUCKET: ${{ steps.vault.outputs.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ steps.vault.outputs.TF_STATE_REGION }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=site-migration-toolkit/terraform.tfstate"

      - name: Terraform Apply / Destroy
        working-directory: ${{ env.ENV_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
          TF_VAR_vultr_api_key: ${{ steps.vault.outputs.VULTR_API_KEY }}
        run: |
          terraform workspace select ${{ github.event.inputs.target_domains }} || terraform workspace new ${{ github.event.inputs.target_domains }}
          terraform ${{ github.event.inputs.terraform_action }} -auto-approve -input=false

      - name: generate.py inventory
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.VPS_ROOT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.TF_STATE_SECRET_KEY }}
        # 同样指定 envs/site-migration-toolkit
        run: python3 scripts/generate.py inventory --resources config/resources/${{ github.event.inputs.target_domains }}.yaml --workdir envs/site-migration-toolkit

      - name: Build deploy matrix
        id: matrix
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.ENV_DIR }}
        run: |
          hosts="$(jq -c 'keys' cmdb.json)"
          echo "hosts=${hosts}" >> "$GITHUB_OUTPUT"
          echo "count=$(jq 'length' cmdb.json)" >> "$GITHUB_OUTPUT"

      - name: Upload CMDB artifact
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        uses: actions/upload-artifact@v7
        with:
          name: site-migration-toolkit-cmdb
          path: |
            ${{ env.ENV_DIR }}/cmdb.json
            ${{ env.ENV_DIR }}/inventory.ini

  # ---------------------------------------------------------------------------
  # 步骤 1.5: 初始化新环境 Vault 凭证 (Initialize Vault Secrets)
  # ---------------------------------------------------------------------------
  initialize_vault_secrets:
    name: Initialize Vault Secrets
    needs: provision
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' && github.event.inputs.terraform_action == 'apply' }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Vault
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          exportToken: true

      - name: Initialize Databases Credentials
        run: |
          URL="${VAULT_ADDR}/v1/kv/data/${{ github.event.inputs.vault_env_path }}/databases"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "X-Vault-Token: $VAULT_TOKEN" "$URL")
          if [ "$STATUS" = "404" ]; then
            echo "Initializing databases credentials..."
            PAYLOAD=$(jq -n \
              --arg postgres_root_password "$(openssl rand -base64 16)" \
              --arg account_pg_password "$(openssl rand -base64 16)" \
              --arg litellm_pg_password "$(openssl rand -base64 16)" \
              --arg rag_pg_password "$(openssl rand -base64 16)" \
              --arg zitadel_pg_password "$(openssl rand -base64 16)" \
              --arg gitea_pg_password "$(openssl rand -base64 16)" \
              --arg vault_pg_password "$(openssl rand -base64 16)" \
              --arg billing_pg_password "$(openssl rand -base64 16)" \
              '{data: {postgres_root_password: $postgres_root_password, account_pg_password: $account_pg_password, litellm_pg_password: $litellm_pg_password, rag_pg_password: $rag_pg_password, zitadel_pg_password: $zitadel_pg_password, gitea_pg_password: $gitea_pg_password, vault_pg_password: $vault_pg_password, billing_pg_password: $billing_pg_password}}')
            curl -sS -X POST -H "X-Vault-Token: $VAULT_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD" "$URL"
          else
            echo "Credentials already exist (Status: $STATUS). Skipping."
          fi

      - name: Initialize Agent Proxy Credentials
        run: |
          URL="${VAULT_ADDR}/v1/kv/data/${{ github.event.inputs.vault_env_path }}/agent-proxy"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "X-Vault-Token: $VAULT_TOKEN" "$URL")
          if [ "$STATUS" = "404" ]; then
            echo "Initializing agent proxy credentials..."
            PAYLOAD=$(jq -n \
              --arg xray_uuid "$(uuidgen)" \
              '{data: {xray_uuid: $xray_uuid}}')
            curl -sS -X POST -H "X-Vault-Token: $VAULT_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD" "$URL"
          else
            echo "Credentials already exist (Status: $STATUS). Skipping."
          fi

  # ---------------------------------------------------------------------------
  # 步骤 2: 基础环境安装 (Bootstrap Deploy)
  # ---------------------------------------------------------------------------
  deploy_base:
    name: Deploy Base Services on ${{ matrix.host }}
    # 只负责 ai-workspace 域 (litellm/qmd/x-memory-hub/postgres/gateway-openclaw 等),
    # 不要对 web-saas / infra-platform 域跑这个全家桶安装器。
    needs: [provision, initialize_vault_secrets]
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' && github.event.inputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","ai-workspace"]'), github.event.inputs.target_domains) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts) }}
    steps:
      - name: Checkout xworkspace-console helpers
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-lab/xworkspace-console
          ref: main

      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Check if host belongs to ai_workspace group
        id: group_check
        run: |
          in_group="$(jq -r '.["${{ matrix.host }}"].groups | contains(["ai_workspace"])' cmdb/cmdb.json)"
          echo "in_group=${in_group}" >> "$GITHUB_OUTPUT"

      - name: Load Vault secrets
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV }} AI_WORKSPACE_AUTH_TOKEN | AI_WORKSPACE_AUTH_TOKEN

      - name: Configure SSH Key
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Wait for host SSH
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          for _ in $(seq 1 60); do
            if nc -z -w 5 "$ip" 22; then exit 0; fi
            sleep 10
          done
          exit 1

      - name: Patch run-on-host-bootstrap.sh
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          sed -i 's/OLLAMA_API_KEY:-}"/OLLAMA_API_KEY:-}"\n  printf '"'"'BRANCH=%q\\n'"'"' "${INFRA_REF:-main}"/' scripts/run-on-host-bootstrap.sh
          sed -i 's/export .* OLLAMA_API_KEY/& BRANCH/' scripts/run-on-host-bootstrap.sh

      - name: Run on-host bootstrap
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        env:
          MATRIX_HOST: ${{ matrix.host }}
          CMDB_PATH: cmdb/cmdb.json
          SSH_KEY_PATH: ~/.ssh/id_deploy
          AI_WORKSPACE_OFFLINE_MODE: 'off'
          AI_WORKSPACE_AUTH_TOKEN: ${{ steps.vault.outputs.AI_WORKSPACE_AUTH_TOKEN }}
          INFRA_REF: ${{ github.event.inputs.infra_ref }}
        run: bash scripts/run-on-host-bootstrap.sh


  # ---------------------------------------------------------------------------
  # 步骤 2b: Web SaaS 域服务部署 (postgresql / stunnel / accounts / billing / console)
  # 单机部署: 所有 web-saas 服务都跑在同一台 provision 出来的主机上, 所以需要先
  # 补上生产环境里各服务各自假设"已经存在"的共享前置条件:
  #   - cn-toolkit-shared Docker 网络 (没有任何 playbook 会创建它, 全靠约定已存在)
  #   - stunnel 自签证书 (postgresql_service 角色如果证书缺失会直接 fail)
  #   - account 库 / account_user 账号 (全新 Postgres 实例, 需要先建库建用户)
  # 所有 web-saas 专属密钥集中放在 kv/data/WEB_SAAS (人工维护, 不再自动生成/
  # 写回): POSTGRES_ROOT_PASSWORD, ACCOUNT_DB_PASSWORD, BILLING_DATABASE_URL,
  # INTERNAL_SERVICE_TOKEN, GHCR_USERNAME, GHCR_PASSWORD。
  # ---------------------------------------------------------------------------
  deploy_web_saas:
    name: Deploy Web SaaS Services on ${{ matrix.host }}
    needs: [provision, initialize_vault_secrets]
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' && github.event.inputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","web-saas"]'), github.event.inputs.target_domains) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts) }}
    steps:
      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref }}
          path: playbooks

      - name: Checkout billing-service
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-services/billing-service
          ref: main
          path: billing-service

      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Check if host belongs to web_saas group
        id: group_check
        run: |
          in_group="$(jq -r '.["${{ matrix.host }}"].groups | contains(["web_saas"])' cmdb/cmdb.json)"
          echo "in_group=${in_group}" >> "$GITHUB_OUTPUT"

      - name: Load Vault secrets
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV_WEB_SAAS }} BILLING_DATABASE_URL | BILLING_DATABASE_URL ;
            ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
            ${{ env.VAULT_KV_WEB_SAAS }} GHCR_USERNAME | GHCR_USERNAME ;
            ${{ env.VAULT_KV_WEB_SAAS }} GHCR_PASSWORD | GHCR_PASSWORD ;
            ${{ env.VAULT_KV_WEB_SAAS }} ACCOUNT_DB_PASSWORD | ACCOUNT_PG_PASSWORD ;
            ${{ env.VAULT_KV_DATABASES }} postgres_root_password | POSTGRES_ROOT_PASSWORD

      - name: Configure SSH Key
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Wait for host SSH
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          for _ in $(seq 1 60); do
            if nc -z -w 5 "$ip" 22; then exit 0; fi
            sleep 10
          done
          exit 1

      - name: Install Ansible
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: pip install --quiet ansible

      - name: Set up Go
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build billing-service binary
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: billing-service
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -buildvcs=false -o dist/billing-service-linux-amd64 ./cmd/billing-service
          chmod 0755 dist/billing-service-linux-amd64

      - name: Bootstrap Docker + Caddy + shared network + stunnel certs
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          cat > /tmp/web-saas-bootstrap.yml <<'EOF'
          - name: Ensure Docker engine, Caddy, shared network, and stunnel certs exist
            hosts: "{{ target_host }}"
            become: true
            gather_facts: true
            roles:
              - roles/vhosts/docker
              # accounts/console 角色只往 conf.d 写 fragment 并 reload caddy
              # 服务, 它们假设 Caddy 本体已经安装; 全新主机需要在这里装好
              - roles/vhosts/caddy
              - roles/host/stunnel-certs
            tasks:
              # 早期 run 渲染 of fragment 用 {$SERVED_DOMAINS} 环境变量占位符做
              # 站点键, systemd 下展开为空键, 会让后续所有服务的 caddy validate
              # 失败; 各服务角色的清理只清自己且跑得太晚, 在这里统一清掉
              - name: Remove stale Caddy fragments keyed on env placeholders
                ansible.builtin.shell: |
                  set -euo pipefail
                  stale="$(grep -l '{\$SERVED_DOMAINS}' /etc/caddy/conf.d/*.caddy 2>/dev/null || true)"
                  if [ -n "${stale}" ]; then
                    rm -f ${stale}
                    echo "removed: ${stale}"
                  fi
                args:
                  executable: /bin/bash
                register: stale_caddy_fragments
                changed_when: stale_caddy_fragments.stdout | trim != ""
              - name: Check for cn-toolkit-shared Docker network
                ansible.builtin.command: docker network inspect cn-toolkit-shared
                register: shared_network_inspect
                changed_when: false
                failed_when: false
              - name: Create cn-toolkit-shared Docker network when missing
                ansible.builtin.command: docker network create cn-toolkit-shared
                when: shared_network_inspect.rc != 0
          EOF
          ansible-playbook -i ../cmdb/inventory.ini /tmp/web-saas-bootstrap.yml \
            -e "target_host=${{ matrix.host }}"

      - name: Checkout postgresql.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-services/postgresql.svc.plus
          ref: main
          path: postgresql-svc-plus

      # postgresql_service 角色默认假设 postgres-extensions:17 这个镜像已经在目标
      # 主机本地存在 (postgresql_service_postgres_pull_image 默认 false)。这不是
      # 任何公开镜像, 是 postgresql.svc.plus 自己仓库里编译 pgvector/pg_jieba/pgmq
      # 的自定义镜像 (deploy/base-images/postgres-runtime-wth-extensions.Dockerfile),
      # 从没发布到任何 registry。全新主机上本地没有这个镜像, compose up 会尝试去
      # Docker Hub 拉 "postgres-extensions" 从而 404/403。
      # 在 runner 上构建一次 (跟 billing-service 二进制同一个思路: 自己编译,
      # 不依赖外部产物), 再用 docker save | ssh docker load 灌进目标主机。
      - name: Build postgres-extensions image
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: postgresql-svc-plus
        run: make build-postgres-image POSTGRES_IMAGE_NAME=postgres-extensions POSTGRES_IMAGE_TAG=17

      - name: Ship postgres-extensions image to host
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          user="$(jq -r '.["${{ matrix.host }}"].ansible_user // "root"' cmdb/cmdb.json)"
          ssh_opts=(-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes)
          docker save postgres-extensions:17 | gzip \
            | ssh "${ssh_opts[@]}" "${user}@${ip}" 'gunzip | docker load'

      # postgresql_service 角色的 stunnel 端镜像 ghcr.io/x-evor/stunnel-server
      # 是 GHCR 私有包 (镜像源码已收编进 x-evor/artifacts oci/stunnel-server,
      # 由其 CI 构建发布), 全新主机没有登录态, compose up 隐式 pull 直接
      # unauthorized。在目标主机上先用 WEB_SAAS 的 GHCR 凭据 docker login,
      # 之后 stunnel / accounts 等私有镜像的拉取都能通过。
      - name: Log target host into GHCR
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        env:
          GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          user="$(jq -r '.["${{ matrix.host }}"].ansible_user // "root"' cmdb/cmdb.json)"
          ssh_opts=(-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes)
          printf '%s' "$GHCR_PASSWORD" \
            | ssh "${ssh_opts[@]}" "${user}@${ip}" \
                "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy postgresql.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          jq -n --arg pw "$POSTGRES_ROOT_PASSWORD" \
            '{postgresql_service_postgres_env_defaults: {POSTGRES_USER: "postgres", POSTGRES_PASSWORD: $pw, POSTGRES_DB: "postgres", PG_LOCAL_PORT: "5432", PG_MAJOR: "17", PG_DATA_PATH: "/data"}}' \
            > /tmp/postgres-env-vars.json
          ansible-playbook -i ../cmdb/inventory.ini deploy_postgresql_svc_plus.yml \
            -e "postgresql_service_hosts=${{ matrix.host }}" \
            -e @/tmp/postgres-env-vars.json

      - name: Deploy stunnel-client
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_stunnel-client.yml \
            -e "stunnel_client_hosts=${{ matrix.host }}"

      # web-saas 主机跑的是自己独立的 postgres 实例 (与 infra-platform 的
      # postgres 是两台不同主机), 这台上的 account/litellm/rag 等库和专属
      # 账号从未有人建过; vault-dataflow 重构只把这一步留在了
      # deploy_infra_platform job 里, 导致 web-saas 独立部署时 account 库
      # 一直不存在, "Initialize account schema when absent" 直接
      # "database account does not exist"。
      # create_databases_and_users.yml 的密码解析优先级是 Env > Vault > 自动生成,
      # 而 Vault 侧的读取/写回都要求 create_databases_and_users.yml 内部拿到一个
      # 可用的 vault_token 才会执行 (它自己再单独认证一次 Vault, 与本 job 的
      # "Load Vault secrets" 是两条独立通路) —— 目前这条通路没有打通, 与其
      # 依赖它, 不如直接把 ACCOUNT_DB_PASSWORD 这个已经在用的固定 Vault 密钥
      # (kv/data/WEB_SAAS, 上面 "Load Vault secrets" 已经安全取出) 作为 Env
      # 层显式传入, 建库和 accounts 容器两边用同一个值, 完全不依赖 Vault
      # 读写是否打通。
      - name: Provision account database and role
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          ACCOUNT_PG_PASSWORD: ${{ steps.vault.outputs.ACCOUNT_PG_PASSWORD }}
        run: |
          ansible-playbook -i ../cmdb/inventory.ini create_databases_and_users.yml \
            --limit "${{ matrix.host }}"

      - name: Checkout accounts.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-services/accounts.svc.plus
          ref: main
          path: accounts-svc-plus

      # deploy-only 模式不做数据迁移, 全新 account 库没有任何表, accounts
      # 服务启动即 "relation users does not exist" 崩溃循环。schema.sql 是
      # drop+recreate 的基线, 只允许在 users 表不存在时初始化一次, 绝不能
      # 在已有数据的库上重跑。
      - name: Initialize account schema when absent
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          user="$(jq -r '.["${{ matrix.host }}"].ansible_user // "root"' cmdb/cmdb.json)"
          ssh_opts=(-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes)
          pg="docker exec -i postgresql psql -U postgres -d account"
          has_users="$(ssh "${ssh_opts[@]}" "${user}@${ip}" \
            "$pg -tAc \"SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='users'\"")"
          if [ "${has_users}" = "1" ]; then
            echo "account schema already present; skipping baseline init"
          else
            ssh "${ssh_opts[@]}" "${user}@${ip}" "$pg -v ON_ERROR_STOP=1 -f -" \
              < accounts-svc-plus/sql/schema.sql
            echo "account baseline schema applied"
          fi

      - name: Deploy accounts.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          ACCOUNTS_PULL_IMAGE: "true"
          # ghcr.io/x-evor/accounts 也是私有镜像; accounts_service 角色会读
          # GHCR_USERNAME/GHCR_PASSWORD 在目标主机上 docker login 后再 pull
          GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
          ACCOUNT_PG_PASSWORD: ${{ steps.vault.outputs.ACCOUNT_PG_PASSWORD }}
        run: |
          # 角色默认的 Caddy 站点写死 accounts.svc.plus / svc.plus, 迁移环境
          # 必须按目标域参数化, 否则 fragment 服务的是源站域名
          jq -n \
            --arg site "accounts.${{ github.event.inputs.target_domain_base }}" \
            --arg fwd "${{ github.event.inputs.target_domain_base }}" \
            '{accounts_service_caddy_sites: [{server_names: [$site], default_forwarded_host: $fwd, upstream: "127.0.0.1:18081"}]}' \
            > /tmp/accounts-caddy-vars.json
          ansible-playbook -i ../cmdb/inventory.ini deploy_accounts_svc_plus.yml \
            -e "accounts_service_hosts=${{ matrix.host }}" \
            -e @/tmp/accounts-caddy-vars.json

      - name: Deploy billing-service
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          BILLING_DATABASE_URL: ${{ steps.vault.outputs.BILLING_DATABASE_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        run: |
          jq -n \
            --arg artifact "${{ github.workspace }}/billing-service/dist/billing-service-linux-amd64" \
            --arg image_ref "ghcr.io/ai-workspace-services/billing-service:${{ github.sha }}" \
            --arg db_url "$BILLING_DATABASE_URL" \
            --arg token "$INTERNAL_SERVICE_TOKEN" \
            --arg hosts "${{ matrix.host }}" \
            '{billing_service_hosts: $hosts, billing_service_binary_artifact: $artifact, billing_service_image_ref: $image_ref, billing_service_database_url: $db_url, billing_service_internal_service_token: $token}' \
            > /tmp/billing-service-vars.json
          ansible-playbook -i ../cmdb/inventory.ini deploy_billing_service.yml \
            -e @/tmp/billing-service-vars.json

      - name: Deploy console.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        run: |
          jq -n \
            --arg hosts "${{ matrix.host }}" \
            --arg image "ghcr.io/ai-workspace-services/console:latest" \
            --arg user "$GHCR_USERNAME" \
            --arg pass "$GHCR_PASSWORD" \
            --arg domain "console.${{ github.event.inputs.target_domain_base }}" \
            '{console_service_target_host: $hosts, console_service_frontend_image: $image, console_service_registry_username: $user, console_service_registry_password: $pass, CANONICAL_DOMAIN: $domain, SERVED_DOMAINS: $domain}' \
            > /tmp/console-vars.json
          ansible-playbook -i ../cmdb/inventory.ini deploy_console_svc_plus.yml \
            -e @/tmp/console-vars.json

      - name: Deploy Vault (Co-located on Web SaaS)
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini setup-vault.yaml \
            --limit "${{ matrix.host }}"

      - name: Deploy Monitoring Agents (Vector/Node/Process)
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_node_process_exporters.yml \
            --limit "${{ matrix.host }}" \
            -e "vector_prometheus_remote_write_url=https://observability.${{ github.event.inputs.target_domain_base }}/ingest/metrics/api/v1/write"

  # ---------------------------------------------------------------------------
  # 步骤 2c: Open Platform 域服务部署 (caddy / docker / postgres / gitea / zitadel / observability)
  # ---------------------------------------------------------------------------
  deploy_infra_platform:
    name: Deploy Open Platform Services on ${{ matrix.host }}
    needs: [provision, initialize_vault_secrets]
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' && github.event.inputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","infra-platform"]'), github.event.inputs.target_domains) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts) }}
    steps:
      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref }}
          path: playbooks

      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Check if host belongs to infra_platform group
        id: group_check
        run: |
          in_group="$(jq -r '.["${{ matrix.host }}"].groups | contains(["infra_platform"])' cmdb/cmdb.json)"
          echo "in_group=${in_group}" >> "$GITHUB_OUTPUT"

      - name: Load Vault secrets
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
            ${{ env.VAULT_KV_WEB_SAAS }} GHCR_USERNAME | GHCR_USERNAME ;
            ${{ env.VAULT_KV_WEB_SAAS }} GHCR_PASSWORD | GHCR_PASSWORD ;
            ${{ env.VAULT_KV_DATABASES }} postgres_root_password | POSTGRES_ROOT_PASSWORD

      - name: Configure SSH Key
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Wait for host SSH
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          for _ in $(seq 1 60); do
            if nc -z -w 5 "$ip" 22; then exit 0; fi
            sleep 10
          done
          exit 1

      - name: Install Ansible
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: pip install --quiet ansible

      - name: Bootstrap Docker + Caddy + shared network
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          cat > /tmp/infra-platform-bootstrap.yml <<'EOF'
          - name: Ensure Docker engine, Caddy, and shared network exist
            hosts: "{{ target_host }}"
            become: true
            gather_facts: true
            roles:
              - roles/vhosts/docker
              - roles/vhosts/caddy
              - roles/host/stunnel-certs
            tasks:
              - name: Check for cn-toolkit-shared Docker network
                ansible.builtin.command: docker network inspect cn-toolkit-shared
                register: shared_network_inspect
                changed_when: false
                failed_when: false
              - name: Create cn-toolkit-shared Docker network when missing
                ansible.builtin.command: docker network create cn-toolkit-shared
                when: shared_network_inspect.rc != 0
          EOF
          ansible-playbook -i ../cmdb/inventory.ini /tmp/infra-platform-bootstrap.yml \
            -e "target_host=${{ matrix.host }}"

      - name: Checkout postgresql.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-services/postgresql.svc.plus
          ref: main
          path: postgresql-svc-plus

      - name: Build postgres-extensions image
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: postgresql-svc-plus
        run: make build-postgres-image POSTGRES_IMAGE_NAME=postgres-extensions POSTGRES_IMAGE_TAG=17

      - name: Ship postgres-extensions image to host
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          user="$(jq -r '.["${{ matrix.host }}"].ansible_user // "root"' cmdb/cmdb.json)"
          ssh_opts=(-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes)
          docker save postgres-extensions:17 | gzip \
            | ssh "${ssh_opts[@]}" "${user}@${ip}" 'gunzip | docker load'

      - name: Log target host into GHCR
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        env:
          GHCR_USERNAME: ${{ steps.vault.outputs.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ steps.vault.outputs.GHCR_PASSWORD }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          user="$(jq -r '.["${{ matrix.host }}"].ansible_user // "root"' cmdb/cmdb.json)"
          ssh_opts=(-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o BatchMode=yes)
          printf '%s' "$GHCR_PASSWORD" \
            | ssh "${ssh_opts[@]}" "${user}@${ip}" \
                "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy postgresql.svc.plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          jq -n --arg pw "$POSTGRES_ROOT_PASSWORD" \
            '{postgresql_service_postgres_env_defaults: {POSTGRES_USER: "postgres", POSTGRES_PASSWORD: $pw, POSTGRES_DB: "postgres", PG_LOCAL_PORT: "5432", PG_MAJOR: "17", PG_DATA_PATH: "/data"}}' \
            > /tmp/postgres-env-vars.json
          ansible-playbook -i ../cmdb/inventory.ini deploy_postgresql_svc_plus.yml \
            -e "postgresql_service_hosts=${{ matrix.host }}" \
            -e @/tmp/postgres-env-vars.json

      - name: Provision platform databases and roles
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini create_databases_and_users.yml \
            --limit "${{ matrix.host }}"

      - name: Deploy Gitea
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini gitea_deploy_temp.yml \
            --limit "${{ matrix.host }}"

      - name: Deploy Zitadel IAM
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_zitadel_docker.yaml \
            -e "zitadel_hosts=${{ matrix.host }}" \
            -e "domain=iam.${{ github.event.inputs.target_domain_base }}"

      - name: Deploy Observability Server Stack (VictoriaMetrics & Grafana)
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_observability.yml \
            -e "observability_server_hosts=${{ matrix.host }}"

      - name: Deploy Monitoring Agents (Vector/Node/Process)
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_node_process_exporters.yml \
            --limit "${{ matrix.host }}" \
            -e "vector_prometheus_remote_write_url=https://observability.${{ github.event.inputs.target_domain_base }}/ingest/metrics/api/v1/write"

  # ---------------------------------------------------------------------------
  # 步骤 2d: Agent Proxy 域服务部署 (caddy / xray / xray-exporter / vector / agent-svc-plus)
  # ---------------------------------------------------------------------------
  deploy_agent_proxy:
    name: Deploy Agent Proxy Services on ${{ matrix.host }}
    needs: [provision, initialize_vault_secrets]
    if: ${{ github.event.inputs.run_provision_and_deploy == 'true' && github.event.inputs.terraform_action == 'apply' && needs.provision.outputs.count != '0' && contains(fromJSON('["all","agent-proxy"]'), github.event.inputs.target_domains) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.provision.outputs.hosts) }}
    steps:
      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref }}
          path: playbooks

      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Check if host belongs to agent_proxy group
        id: group_check
        run: |
          in_group="$(jq -r '.["${{ matrix.host }}"].groups | contains(["agent_proxy"])' cmdb/cmdb.json)"
          echo "in_group=${in_group}" >> "$GITHUB_OUTPUT"

      - name: Load Vault secrets
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV_WEB_SAAS }} INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
            ${{ env.VAULT_KV_AGENT_PROXY }} xray_uuid | XRAY_UUID

      - name: Configure SSH Key
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Wait for host SSH
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: |
          ip="$(jq -r '.["${{ matrix.host }}"].ip' cmdb/cmdb.json)"
          for _ in $(seq 1 60); do
            if nc -z -w 5 "$ip" 22; then exit 0; fi
            sleep 10
          done
          exit 1

      - name: Install Ansible
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        run: pip install --quiet ansible

      - name: Bootstrap Caddy + Xray on Agent Proxy Node
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          cat > /tmp/agent-proxy-bootstrap.yml <<'EOF'
          - name: Bootstrap Caddy and Xray binary on Agent Proxy Node
            hosts: "{{ target_host }}"
            become: true
            gather_facts: true
            roles:
              - roles/vhosts/caddy
            tasks:
              - name: Install Xray binary using XTLS installation script
                ansible.builtin.shell: |
                  curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh -o /tmp/install-release.sh
                  bash /tmp/install-release.sh
                args:
                  creates: /usr/local/bin/xray

              - name: Ensure dummy/template xray-tcp.service is defined
                ansible.builtin.copy:
                  dest: /etc/systemd/system/xray-tcp.service
                  content: |
                    [Unit]
                    Description=Xray Service (TCP)
                    [Service]
                    ExecStart=/usr/local/bin/xray run -config /usr/local/etc/xray/tcp-config.json
                  mode: '0644'

              - name: Ensure dummy/template xray.service is defined
                ansible.builtin.copy:
                  dest: /etc/systemd/system/xray.service
                  content: |
                    [Unit]
                    Description=Xray Service (XHTTP)
                    [Service]
                    ExecStart=/usr/local/bin/xray run -config /usr/local/etc/xray/config.json
                  mode: '0644'
          EOF
          ansible-playbook -i ../cmdb/inventory.ini /tmp/agent-proxy-bootstrap.yml \
            -e "target_host=${{ matrix.host }}"

      - name: Deploy agent-svc-plus
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
          XRAY_UUID: ${{ steps.vault.outputs.XRAY_UUID }}
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_xray_proxy_server.yml \
            -e "agent_service_hosts=${{ matrix.host }}" \
            -e "agent_controller_url=https://accounts.${{ github.event.inputs.target_domain_base }}" \
            -e "agent_id=${{ matrix.host }}" \
            -e "xray_uuid=${XRAY_UUID}" \
            -e "agent_svc_plus_manage_source_checkout=true" \
            -e "agent_svc_plus_build_on_target=true"

      - name: Deploy xray-exporter
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_xray_exporter.yml \
            -e "xray_exporter_hosts=${{ matrix.host }}"

      - name: Deploy Monitoring Agents (Vector/Node/Process)
        if: ${{ steps.group_check.outputs.in_group == 'true' }}
        working-directory: playbooks
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
        run: |
          ansible-playbook -i ../cmdb/inventory.ini deploy_node_process_exporters.yml \
            --limit "${{ matrix.host }}" \
            -e "vector_prometheus_remote_write_url=https://observability.${{ github.event.inputs.target_domain_base }}/ingest/metrics/api/v1/write"

  # ---------------------------------------------------------------------------
  # 步骤 3: 全站单向数据流迁移与环境恢复 (Data Migration)
  # ---------------------------------------------------------------------------
  data_migration:
    name: Migrate Site Data (Source -> Target)
    needs: [deploy_base, deploy_web_saas, deploy_infra_platform, deploy_agent_proxy]
    if: ${{ always() && (needs.deploy_base.result == 'success' || needs.deploy_base.result == 'skipped') && (needs.deploy_web_saas.result == 'success' || needs.deploy_web_saas.result == 'skipped') && (needs.deploy_infra_platform.result == 'success' || needs.deploy_infra_platform.result == 'skipped') && (needs.deploy_agent_proxy.result == 'success' || needs.deploy_agent_proxy.result == 'skipped') && github.event.inputs.terraform_action == 'apply' && github.event.inputs.toolkit_action != 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download CMDB
        # 只在 provision 运行的情况下下载
        if: ${{ github.event.inputs.run_provision_and_deploy == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Checkout site-migration-toolkit
        uses: actions/checkout@v7
        with:
          path: site-migration-toolkit

      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref }}
          path: playbooks

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Load Vault secrets for SSH
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} SSH_PRIVATE_DEPLOY_KEY_B64 | ANSIBLE_SSH_KEY_B64 ;
            ${{ env.VAULT_KV }} TF_STATE_BUCKET | MIGRATION_S3_BUCKET ;
            ${{ env.VAULT_KV }} TF_STATE_ACCESS_KEY | MIGRATION_S3_ACCESS_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_SECRET_KEY | MIGRATION_S3_SECRET_KEY ;
            ${{ env.VAULT_KV }} TF_STATE_REGION | MIGRATION_S3_REGION ;
            ${{ env.VAULT_KV }} TF_STATE_ENDPOINT | MIGRATION_S3_ENDPOINT ;

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ steps.vault.outputs.ANSIBLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Run Toolkit Action (${{ github.event.inputs.toolkit_action }})
        working-directory: site-migration-toolkit
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          ANSIBLE_SSH_ARGS: "-o IdentityFile=~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          MIGRATION_S3_BUCKET: ${{ steps.vault.outputs.MIGRATION_S3_BUCKET }}
          MIGRATION_S3_ACCESS_KEY: ${{ steps.vault.outputs.MIGRATION_S3_ACCESS_KEY }}
          MIGRATION_S3_SECRET_KEY: ${{ steps.vault.outputs.MIGRATION_S3_SECRET_KEY }}
          MIGRATION_S3_REGION: ${{ steps.vault.outputs.MIGRATION_S3_REGION }}
          MIGRATION_S3_ENDPOINT: ${{ steps.vault.outputs.MIGRATION_S3_ENDPOINT }}
        run: |
          make ${{ github.event.inputs.toolkit_action }} DOMAIN=${{ github.event.inputs.target_domains }} RUN_ARGS="-e source_host=${{ github.event.inputs.source_host }} -e target_host=www.${{ github.event.inputs.target_domain_base }} -e target_domain=${{ github.event.inputs.target_domain_base }} -e migration_flow.source.domain_base=${{ github.event.inputs.source_domain_base }}"

  switch_dns:
    name: Switch DNS Traffic (Manual Approval)
    needs: data_migration
    if: ${{ (needs.data_migration.result == 'success' || needs.data_migration.result == 'skipped') && github.event.inputs.terraform_action == 'apply' && github.event.inputs.confirm_dns_switch == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download CMDB
        uses: actions/download-artifact@v8
        with:
          name: site-migration-toolkit-cmdb
          path: cmdb

      - name: Checkout playbooks
        uses: actions/checkout@v7
        with:
          repository: ai-workspace-infra/playbooks
          ref: ${{ github.event.inputs.infra_ref }}
          path: playbooks

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Load Vault secrets for DNS
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: ${{ github.event.inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ github.event.inputs.vault_token }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: vault
          ignoreNotFound: true
          secrets: |
            ${{ env.VAULT_KV }} CLOUDFLARE_DNS_API_TOKEN | CLOUDFLARE_DNS_API_TOKEN ;
            ${{ env.VAULT_KV_AGENT_PROXY }} xray_uuid | XRAY_UUID

      - name: Switch Cloudflare DNS Records
        env:
          CLOUDFLARE_DNS_API_TOKEN: ${{ steps.vault.outputs.CLOUDFLARE_DNS_API_TOKEN }}
        run: |
          cd playbooks
          ansible-playbook -i ../cmdb/inventory.ini update_site_dns.yml -e "target_domain=${{ github.event.inputs.target_domain_base }}" -e "source_domain=${{ github.event.inputs.source_domain_base }}"
