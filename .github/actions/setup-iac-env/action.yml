name: Setup Multi-Cloud IaC Environment
description: "Checkout GitOps repo, configure Terraform, TFLint, and AWS credentials"
inputs:
  gitops_repo_name:
    description: "GitOps repository URL"
    required: false
    default: "https://github.com/cloud-neutral-workshop/gitops.git"
  gitops_repo_ref:
    description: "GitOps repository reference"
    required: false
    default: "main"
  gitops_target_path:
    description: "Checkout path for GitOps config"
    required: false
    default: "gitops"
  aws_region:
    description: "AWS region"
    required: false
    default: "ap-northeast-1"
  aws_role_arn:
    description: "AWS role ARN (for OIDC). If not provided or if cloud provider does not support native OIDC, workflow falls back to Vault JWT (Role Policy) to obtain cloud provider credentials."
    required: false
  terraform_version:
    description: "Terraform version"
    required: false
    default: "1.9.5"
  tflint_version:
    description: "Tflint version"
    required: false
    default: "v0.51.0"
  install_terragrunt:
    description: "Whether to install terragrunt"
    required: false
    default: "false"
  terragrunt_version:
    description: "Terragrunt version to install"
    required: false
    default: "0.67.14"

runs:
  using: "composite"
  steps:
    - name: Normalize GitOps repo
      id: gitops_repo
      shell: bash
      run: |
        repo_input="${{ inputs.gitops_repo_name }}"
        case "$repo_input" in
          https://github.com/*) repo="${repo_input#https://github.com/}" ;;
          git@github.com:*) repo="${repo_input#git@github.com:}" ;;
          *) repo="$repo_input" ;;
        esac
        repo="${repo%.git}"
        if [ -z "$repo" ]; then
          echo "GitOps repo is empty after normalization." >&2
          exit 1
        fi
        echo "repo=$repo" >> "$GITHUB_OUTPUT"

    - name: Checkout GitOps config
      uses: actions/checkout@v4
      with:
        repository: ${{ steps.gitops_repo.outputs.repo }}
        path: ${{ inputs.gitops_target_path }}
        ref: ${{ inputs.gitops_repo_ref }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: ${{ inputs.tflint_version }}

    - name: Install Terragrunt
      if: ${{ inputs.install_terragrunt == 'true' }}
      shell: bash
      run: |
        curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64" -o terragrunt
        sudo install terragrunt /usr/local/bin/terragrunt

    - name: Configure AWS Credentials (OIDC)
      if: ${{ inputs.aws_role_arn != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: ${{ inputs.aws_role_arn }}
